                content += `<div class="space-y-3 border-t border-gray-600 pt-4">`;
                if (custosFiltrados.length > 0) {
                    custosFiltrados.forEach(item => {
                        const originalIndex = this.db.custos.indexOf(item);
                        const statusClass = item.pago ? 'bg-green-600' : 'bg-red-700';
                        const statusButton = `<button class="flex-grow md:flex-grow-0 px-3 py-1 rounded-md text-white text-xs font-medium ${statusClass}" onclick="App.toggleCustoStatus(${originalIndex})">${item.pago ? 'Pago' : 'Pendente'}</button>`;
                        
                        content += `
                            <div class="flex flex-col md:flex-row justify-between items-start md:items-center p-3 bg-gray-600 rounded-md gap-2 fade-in">
                                <div class="flex-1">
                                    <p class="font-semibold text-gray-100">${this.formatDate(item.data)} - ${item.obs}</p>
                                    <p class="text-sm text-gray-200">${this.formatCurrency(item.valor)}</p>
                                </div>
                                <div class="flex items-center gap-2 w-full md:w-auto mt-2 md:mt-0">
                                    ${statusButton}
                                    <button class="text-blue-300 hover:text-blue-200 p-1" onclick="App.render('custos', { editingIndex: ${originalIndex} })" title="Editar">✏️</button>
                                    <button class="text-red-400 hover:text-red-300 p-1" onclick="App.apagarCusto(${originalIndex})" title="Apagar">🗑️</button>
                                </div>
                            </div>`;
                    });
                } else {
                    content += `<p class="text-gray-400">Nenhum custo registrado para ${nomesMeses[this.state.selectedCustoMes]} de ${this.state.selectedCustoAno}.</p>`;
                }
                content += `</div>`;
                content += `</div>`; // Fecha o card-gradient dos registros
                return content;
            },
            adicionarCusto: function() {
                const data = document.getElementById('item-data').value;
                const obs = document.getElementById('item-obs').value;
                const valor = parseFloat(document.getElementById('item-valor').value);
                const editingIndex = this.state.editingCustoIndex;
                
                if (data && obs && valor > 0) {
                    const newItem = { data, obs, valor };
                    if (editingIndex !== null) {
                        newItem.pago = this.db.custos[editingIndex].pago; // Mantém o status de pagamento
                        this.db.custos[editingIndex] = newItem;
                    } else {
                        newItem.pago = false; // Novos custos são pendentes por padrão
                        this.db.custos.unshift(newItem);
                    }
                    this.saveDB();
                    // Atualiza o estado para o período do item adicionado/editado
                    const dataObj = this.parseDate(data);
                    this.state.selectedCustoAno = dataObj.getFullYear();
                    this.state.selectedCustoMes = dataObj.getMonth();
                    this.render('custos');
                } else {
                    alert("Por favor, preencha todos os campos.");
                }
            },
            apagarCusto: function(index) {
                if (confirm(`Tem a certeza que quer apagar este custo?`)) {
                    this.db.custos.splice(index, 1);
                    this.saveDB();
                    this.render('custos');
                }
            },
            toggleCustoStatus: function(index) {
                const custo = this.db.custos[index];
                if (custo) {
                    custo.pago = !custo.pago;
                    this.saveDB();
                }
                this.render('custos');
            },
            selectCustoAno: function(ano) {
                this.state.selectedCustoAno = parseInt(ano);
                this.render('custos');
            },
            selectCustoMes: function(mes) {
                this.state.selectedCustoMes = parseInt(mes);
                this.render('custos');
            },
            renderContribuicoes: function() {
                const title = 'Contribuições Voluntárias';
                let content = `<h2 class="text-3xl font-semibold mb-6 text-red-400">${title}</h2>`;
                
                const editingIndex = this.state.editingContribIndex;
                const isEditing = editingIndex !== null;
                const item = isEditing ? this.db.contribuicoes[editingIndex] : {};

                // Formulário de Adição/Edição
                content += `
                    <div class="card-gradient p-6 rounded-lg shadow-xl mb-6">
                        <h3 class="text-xl font-semibold mb-4 text-gray-200">${isEditing ? `Editar Contribuição` : `Adicionar Nova Contribuição`}</h3>
                        <form id="add-contrib-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <input type="date" id="contrib-data" class="form-input" style="color-scheme: dark;" value="${item.data || ''}" required>
                            <input type="text" id="contrib-obs" placeholder="Observação" class="form-input" value="${item.obs || ''}" required>
                            <input type="number" id="contrib-valor" placeholder="Valor (R$)" step="0.01" min="0.01" class="form-input" value="${item.valor || ''}" required>
                            <div class="md:col-span-3">
                                <button type="button" class="btn-primary w-full px-4 py-2 rounded-md" onclick="App.adicionarContribuicao()">${isEditing ? 'Atualizar' : 'Adicionar'}</button>
                                ${isEditing ? `<button type="button" class="btn-secondary w-full px-4 py-2 rounded-md mt-2" onclick="App.render('contribuicoes')">Cancelar Edição</button>` : ''}
                            </div>
                        </form>
                    </div>
                `;

                // Seção de Registros com Filtros
                content += `<div class="card-gradient p-6 rounded-lg shadow-xl">`;
                content += `<h3 class="text-xl font-semibold mb-4 text-gray-200">Registros</h3>`;

                const anosDisponiveis = this.getAnosDisponiveis('contribuicoes');
                const nomesMeses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

                // Filtros Dropdown
                content += `<div class="flex flex-wrap gap-4 mb-6">`;
                // Dropdown Ano
                content += `<div class="flex-1 min-w-[120px]">
                                <label for="contrib-ano-select" class="block text-sm font-medium text-gray-300 mb-1">Ano</label>
                                <select id="contrib-ano-select" class="form-select w-full" onchange="App.selectContribAno(this.value)">
                                    ${anosDisponiveis.map(ano => `<option value="${ano}" ${ano === this.state.selectedContribAno ? 'selected' : ''}>${ano}</option>`).join('')}
                                </select>
                            </div>`;
                // Dropdown Mês
                content += `<div class="flex-1 min-w-[120px]">
                                <label for="contrib-mes-select" class="block text-sm font-medium text-gray-300 mb-1">Mês</label>
                                <select id="contrib-mes-select" class="form-select w-full" onchange="App.selectContribMes(this.value)">
                                    ${nomesMeses.map((nome, index) => `<option value="${index}" ${index === this.state.selectedContribMes ? 'selected' : ''}>${nome}</option>`).join('')}
                                </select>
                            </div>`;
                content += `</div>`;

                // Lista de Itens Filtrados
                const contribsFiltradas = (this.db.contribuicoes || []).filter(contrib => {
                    const data = this.parseDate(contrib.data);
                    return data && data.getFullYear() === this.state.selectedContribAno && data.getMonth() === this.state.selectedContribMes;
                }).sort((a,b) => App.parseDate(a.data) - App.parseDate(b.data));

                content += `<div class="space-y-3 border-t border-gray-600 pt-4">`;
                if (contribsFiltradas.length > 0) {
                    contribsFiltradas.forEach(item => {
                        const originalIndex = this.db.contribuicoes.indexOf(item);
                        content += `
                            <div class="flex flex-col md:flex-row justify-between items-start md:items-center p-3 bg-gray-600 rounded-md gap-2 fade-in">
                                <div class="flex-1">
                                    <p class="font-semibold text-gray-100">${this.formatDate(item.data)} - ${item.obs}</p>
                                    <p class="text-sm text-gray-200">${this.formatCurrency(item.valor)}</p>
                                </div>
                                <div class="flex items-center gap-2 w-full md:w-auto mt-2 md:mt-0">
                                    <button class="text-blue-300 hover:text-blue-200 p-1" onclick="App.render('contribuicoes', { editingIndex: ${originalIndex} })" title="Editar">✏️</button>
                                    <button class="text-red-400 hover:text-red-300 p-1" onclick="App.apagarContribuicao(${originalIndex})" title="Apagar">🗑️</button>
                                </div>
                            </div>`;
                    });
                } else {
                    content += `<p class="text-gray-400">Nenhuma contribuição registrada para ${nomesMeses[this.state.selectedContribMes]} de ${this.state.selectedContribAno}.</p>`;
                }
                content += `</div>`;
                content += `</div>`;
                return content;
            },
            adicionarContribuicao: function() {
                const data = document.getElementById('contrib-data').value;
                const obs = document.getElementById('contrib-obs').value;
                const valor = parseFloat(document.getElementById('contrib-valor').value);
                const editingIndex = this.state.editingContribIndex;
                
                if (data && obs && valor > 0) {
                    const newItem = { data, obs, valor };
                    if (editingIndex !== null) {
                        this.db.contribuicoes[editingIndex] = newItem;
                    } else {
                        this.db.contribuicoes.unshift(newItem);
                    }
                    this.saveDB();
                    const dataObj = this.parseDate(data);
                    this.state.selectedContribAno = dataObj.getFullYear();
                    this.state.selectedContribMes = dataObj.getMonth();
                    this.render('contribuicoes');
                } else {
                    alert("Por favor, preencha todos os campos.");
                }
            },
            apagarContribuicao: function(index) {
                if (confirm(`Tem a certeza que quer apagar esta contribuição?`)) {
                    this.db.contribuicoes.splice(index, 1);
                    this.saveDB();
                    this.render('contribuicoes');
                }
            },
            selectContribAno: function(ano) {
                this.state.selectedContribAno = parseInt(ano);
                this.render('contribuicoes');
            },
            selectContribMes: function(mes) {
                this.state.selectedContribMes = parseInt(mes);
                this.render('contribuicoes');
            },
            
            // 6. SEÇÃO: INADIMPLÊNCIA
            renderInadimplencia: function() {
                let content = `<h2 class="text-3xl font-semibold mb-6 text-red-400">Relatório de Inadimplência</h2>`;
                content += '<div class="card-gradient p-6 rounded-lg shadow-xl">';
                
                let inadimplentesEncontrados = false;
                let totalGeralDevido = 0;
                const nomesMeses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

                content += '<div class="space-y-6">';

                const adeptosOrdenados = this.db.adeptos
                    .map((adepto, index) => ({ adepto, index }))
                    .sort((a, b) => a.adepto.nome.localeCompare(b.adepto.nome, 'pt-BR'));

                adeptosOrdenados.forEach(({ adepto, index }) => {
                    const resumo = this.calcularResumoFinanceiro(index);
                    if (resumo.saldo < 0) {
                        inadimplentesEncontrados = true;
                        totalGeralDevido += resumo.saldo;
                        
                        let detalhesHTML = '<ul class="mt-2 space-y-2 text-sm text-gray-300 border-t border-gray-600 pt-3">';
                        
                        // Mensalidades
                        for (const ano in adepto.financeiro.mensalidades) {
                            for (const mes in adepto.financeiro.mensalidades[ano] || {}) {
                                const m = adepto.financeiro.mensalidades[ano][mes];
                                if (m.status === 'pendente') {
                                    detalhesHTML += `<li>• Mensalidade de ${nomesMeses[mes]} de ${ano} - <span class="text-red-400">${this.formatCurrency(this.config.valorMensalidade)}</span></li>`;
                                } else if (m.status === 'parcial') {
                                    const devido = this.config.valorMensalidade - m.valorPago;
                                    detalhesHTML += `<li>• Mensalidade de ${nomesMeses[mes]} de ${ano} (Parcial) - <span class="text-red-400">${this.formatCurrency(devido)}</span></li>`;
                                }
                            }
                        }

                        // Débitos e Compras
                        (adepto.financeiro.debitos || []).forEach(d => {
                            if (d.status === 'pendente') {
                                detalhesHTML += `<li>• ${d.obs} em ${this.formatDate(d.data)} - <span class="text-red-400">${this.formatCurrency(d.valor)}</span></li>`;
                            } else if (d.status === 'parcial') {
                                const devido = d.valor - d.valorPago;
                                detalhesHTML += `<li>• ${d.obs} em ${this.formatDate(d.data)} (Parcial) - <span class="text-red-400">${this.formatCurrency(devido)}</span></li>`;
                            }
                        });

                        detalhesHTML += '</ul>';

                        content += `
                            <details class="bg-gray-700 rounded-md group cursor-pointer">
                                <summary class="flex justify-between items-center p-4 list-none [&::-webkit-details-marker]:hidden">
                                    <h4 class="text-lg font-semibold text-gray-200 group-open:text-red-400 transition-colors">${adepto.nome}</h4>
                                    <div class="flex items-center gap-4">
                                        <span class="font-bold text-red-400">${this.formatCurrency(resumo.saldo)}</span>
                                        <span class="text-gray-400 group-open:rotate-180 transition-transform">▼</span>
                                    </div>
                                </summary>
                                <div class="px-4 pb-4">
                                    ${detalhesHTML}
                                </div>
                            </details>
                        `;
                    }
                });

                content += '</div>';

                if (!inadimplentesEncontrados) {
                    content += '<p class="text-gray-400">Nenhum adepto inadimplente encontrado.</p>';
                }

                content += `
                    <footer class="border-t border-gray-700 mt-6 pt-4">
                        <div class="flex justify-between items-center text-lg">
                            <span class="text-gray-300">Total Geral Devido:</span>
                            <span class="font-bold text-red-500">${this.formatCurrency(totalGeralDevido)}</span>
                        </div>
                    </footer>
                `;

                content += '</div>';
                return content;
            },

            // 7. FUNÇÕES UTILITÁRIAS
            formatCurrency: function(value) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0); },
            formatDate: function(dateString) {
                if (!dateString) return '';
                const [year, month, day] = dateString.split('-');
                return `${day}/${month}/${year}`;
            },
            parseDate: function(dateString) {
                if (!dateString) return null;
                const parts = dateString.split('-');
                return new Date(parts[0], parts[1] - 1, parts[2]);
            },
            getAnosDisponiveis: function(dbKey = null) {
                const anos = new Set();
                if (dbKey === 'custos' || !dbKey) {
                    (this.db.custos || []).forEach(c => anos.add(this.parseDate(c.data)?.getFullYear()));
                }
                if (dbKey === 'contribuicoes' || !dbKey) {
                    (this.db.contribuicoes || []).forEach(c => anos.add(this.parseDate(c.data)?.getFullYear()));
                }
                if (!dbKey) { // Se não for especificado, pega de todos
                    this.db.adeptos.forEach(a => {
                        if (a.financeiro && a.financeiro.mensalidades) {
                            Object.keys(a.financeiro.mensalidades).forEach(ano => anos.add(parseInt(ano)));
                        }
                        if (a.financeiro && a.financeiro.debitos) {
                            (a.financeiro.debitos || []).forEach(d => anos.add(this.parseDate(d.data)?.getFullYear()));
                        }
                    });
                }
                anos.delete(NaN); anos.delete(undefined); // Remove valores inválidos
                const anosArray = Array.from(anos).sort((a, b) => b - a);
                if (anosArray.length === 0) anosArray.push(new Date().getFullYear());
                return anosArray;
            },

            exportAdeptoPDF: function(index) {
                const adepto = this.db.adeptos[index];
                const doc = new jsPDF();
                
                doc.setFontSize(18);
                doc.text("Ficha Cadastral de Adepto", 105, 20, { align: 'center' });

                const addField = (label, value) => {
                    return [label, value || 'Não informado'];
                };

                const body = [
                    addField("Status", adepto.ativo !== false ? "Ativo" : "Inativo"),
                    addField("Nome Completo", adepto.nome),
                    addField("Data de Nascimento", this.formatDate(adepto.dataNascimento)),
                    addField("Data de Entrada no TCAPB", this.formatDate(adepto.dataEntradaTQPB)),
                    addField("Estado Civil", adepto.estadoCivil),
                    addField("Endereço", adepto.endereco),
                    addField("Complemento", adepto.complemento),
                    addField("E-mail", adepto.email),
                    addField("Rede Social", `${adepto.redeSocialTipo}: ${adepto.redeSocialUser}`),
                    addField("Telefone", adepto.telefone),
                    addField("Atividade Profissional", adepto.atividadeProfissional),
                    addField("Mestre Exu", adepto.mestreExu),
                    addField("Mestra Pombagira", adepto.mestraPombagira),
                    addField("Como soube dos mestres", adepto.comoSoube),
                    addField("Obrigações realizadas", adepto.obrigacoesRealizadas),
                    addField("Status de Batismo", adepto.statusBatismo),
                ];

                if (adepto.statusBatismo === 'Batizado(a)') {
                    body.push(addField("Data de Batismo", this.formatDate(adepto.dataBatismo)));
                }
                body.push(addField("Alergias/Doenças", adepto.alergiaDoenca));
                body.push(addField("Uso de Medicação/Drogas", adepto.medicacaoDrogas));

                doc.autoTable({
                    startY: 30,
                    head: [['Campo', 'Informação']],
                    body: body,
                    theme: 'grid',
                    headStyles: { fillColor: [239, 68, 68] }, // Vermelho
                    styles: { cellPadding: 2, fontSize: 10 },
                    columnStyles: { 0: { cellWidth: 50, fontStyle: 'bold' } }
                });

                let finalY = doc.lastAutoTable.finalY + 20;
                doc.text("________________________________________", 105, finalY, { align: 'center' });
                finalY += 5;
                doc.text("Assinatura do Adepto", 105, finalY, { align: 'center' });

                doc.save(`Ficha_Cadastral_${adepto.nome.replace(/ /g, '_')}.pdf`);
            },

            exportBackup: function() {
                if (!confirm('Deseja criar um backup de todos os dados da aplicação em formato XLSX (Excel)?')) {
                    return;
                }

                const wb = XLSX.utils.book_new();

                // 1. Aba de Adeptos (Cadastro)
                const adeptosCad = this.db.adeptos.map(a => ({
                    ID: a.id, Status: a.ativo !== false ? 'Ativo' : 'Inativo', Nome: a.nome, 'Data Entrada': a.dataEntradaTQPB, 'Data Nasc': a.dataNascimento,
                    'Estado Civil': a.estadoCivil, Endereco: a.endereco, Complemento: a.complemento, Email: a.email,
                    Telefone: a.telefone, 'Rede Social': `${a.redeSocialTipo} ${a.redeSocialUser}`, Profissao: a.atividadeProfissional,
                    'Mestre Exu': a.mestreExu, 'Mestra Pombagira': a.mestraPombagira, 'Como Soube': a.comoSoube,
                    Obrigacoes: a.obrigacoesRealizadas, Batismo: a.statusBatismo, 'Data Batismo': a.dataBatismo,
                    Alergias: a.alergiaDoenca, Medicacao: a.medicacaoDrogas
                }));
                const wsAdeptos = XLSX.utils.json_to_sheet(adeptosCad);
                XLSX.utils.book_append_sheet(wb, wsAdeptos, "Adeptos");

                // 2. Aba Financeiro (Mensalidades e Débitos)
                const financeiroData = [];
                this.db.adeptos.forEach(a => {
                    // Mensalidades
                    for (const ano in a.financeiro.mensalidades) {
                        for (const mes in a.financeiro.mensalidades[ano]) {
                            const m = a.financeiro.mensalidades[ano][mes];
                            if (m.status !== 'desativado' && m.status !== 'futuro') {
                                financeiroData.unshift({
                                    Adepto: a.nome, Tipo: 'Mensalidade', Data: `${parseInt(mes)+1}/${ano}`,
                                    Descricao: `Mensalidade ${mes}/${ano}`, Status: m.status,
                                    'Valor Total': this.config.valorMensalidade, 'Valor Pago': m.valorPago || 0
                                });
                            }
                        }
                    }
                    // Débitos
                    (a.financeiro.debitos || []).forEach(d => {
                        financeiroData.unshift({
                            Adepto: a.nome, Tipo: 'Debito', Data: d.data, Descricao: d.obs,
                            Status: d.status, 'Valor Total': d.valor, 'Valor Pago': d.valorPago || 0
                        });
                    });
                });
                const wsFinanceiro = XLSX.utils.json_to_sheet(financeiroData);
                XLSX.utils.book_append_sheet(wb, wsFinanceiro, "Financeiro");

                // 3. Aba de Custos
                const wsCustos = XLSX.utils.json_to_sheet(this.db.custos || []);
                XLSX.utils.book_append_sheet(wb, wsCustos, "Custos");

                // 4. Aba de Contribuições
                const wsContribuicoes = XLSX.utils.json_to_sheet(this.db.contribuicoes || []);
                XLSX.utils.book_append_sheet(wb, wsContribuicoes, "Contribuicoes");

                // Gerar e baixar o arquivo
                XLSX.writeFile(wb, "tcapb_backup.xlsx");
            },

            resetData: function() {
                if (confirm('ATENÇÃO: Isso apagará os dados salvos no navegador e recarregará a lista original de adeptos do código. Deseja continuar?')) {
                    localStorage.removeItem('tqpb_db');
                    location.reload();
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
