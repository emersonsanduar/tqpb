<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCAPB - Gestão Financeira</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonte Inter do Google -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bibliotecas para gerar PDF e XLSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* Estilos personalizados */
        :root {
            --bg: #0f172a;
            --bg-deep: #020617;
            --panel: rgba(30, 41, 59, 0.82);
            --panel-strong: rgba(15, 23, 42, 0.94);
            --line: rgba(148, 163, 184, 0.18);
            --line-strong: rgba(239, 68, 68, 0.32);
            --red: #ef4444;
            --red-dark: #991b1b;
            --text-soft: #cbd5e1;
        }
        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(239, 68, 68, 0.62) rgba(15, 23, 42, 0.55);
        }
        *::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        *::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.55);
        }
        *::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #ef4444, #7f1d1d);
            border: 2px solid #0f172a;
            border-radius: 999px;
        }
        body {
            font-family: 'Inter', sans-serif;
            background:
                linear-gradient(rgba(148, 163, 184, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.035) 1px, transparent 1px),
                linear-gradient(135deg, #020617 0%, #0f172a 42%, #111827 100%);
            background-size: 42px 42px, 42px 42px, auto;
            background-attachment: fixed;
            color: #f8fafc;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(180deg, rgba(239, 68, 68, 0.08), transparent 26%),
                linear-gradient(90deg, rgba(15, 23, 42, 0.55), transparent 28%, transparent 72%, rgba(15, 23, 42, 0.5));
            z-index: -1;
        }
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg width='360' height='260' viewBox='0 0 360 260' xmlns='http://www.w3.org/2000/svg'%3E%3Cg stroke='white' stroke-width='1.4' stroke-linecap='round' opacity='0.46'%3E%3Cg transform='translate(38 42)'%3E%3Cpath d='M0 -8V8M-8 0H8'/%3E%3C/g%3E%3Cg transform='translate(178 64) rotate(90)'%3E%3Cpath d='M0 -9V9M-9 0H9'/%3E%3C/g%3E%3Cg transform='translate(306 38) rotate(45)'%3E%3Cpath d='M0 -8V8M-8 0H8'/%3E%3C/g%3E%3Cg transform='translate(94 160) rotate(-45)'%3E%3Cpath d='M0 -7V7M-7 0H7'/%3E%3C/g%3E%3Cg transform='translate(246 176) rotate(180)'%3E%3Cpath d='M0 -10V10M-10 0H10'/%3E%3C/g%3E%3Cg transform='translate(332 222) rotate(28)'%3E%3Cpath d='M0 -6V6M-6 0H6'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            background-size: 360px 260px;
            background-position: 18px 22px;
            opacity: 0.16;
            z-index: -1;
        }
        ::selection {
            background: rgba(239, 68, 68, 0.42);
            color: #ffffff;
        }
        #app {
            position: relative;
            min-height: 100vh;
        }
        #app > header {
            position: sticky;
            top: 0;
            z-index: 20;
            padding: 1rem 0 1.5rem;
            backdrop-filter: blur(18px);
        }
        #app > header h1,
        #login-screen h1 {
            text-shadow: 0 0 24px rgba(239, 68, 68, 0.35);
        }
        #main-content {
            max-width: 1500px;
        }
        .btn-primary {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 52%, #7f1d1d 100%);
            border: 1px solid rgba(248, 113, 113, 0.8);
            box-shadow: 0 10px 24px rgba(127, 29, 29, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.18);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease, filter 0.25s ease;
        }
        .btn-primary::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(110deg, transparent 0%, rgba(255, 255, 255, 0.18) 45%, transparent 70%);
            transform: translateX(-120%);
            transition: transform 0.55s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 16px 34px rgba(239, 68, 68, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.22);
            border-color: #f87171;
            filter: saturate(1.08);
        }
        .btn-primary:hover::before {
            transform: translateX(120%);
        }
        .btn-primary:active,
        .btn-secondary:active {
            transform: translateY(0) scale(0.99);
        }
        .btn-secondary {
            background: linear-gradient(135deg, rgba(71, 85, 105, 0.95) 0%, rgba(30, 41, 59, 0.98) 100%);
            border: 1px solid rgba(148, 163, 184, 0.28);
            box-shadow: 0 10px 24px rgba(2, 6, 23, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease, background 0.25s ease;
        }
        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 30px rgba(2, 6, 23, 0.34);
            border-color: #94a3b8;
            background: linear-gradient(135deg, rgba(100, 116, 139, 0.98) 0%, rgba(51, 65, 85, 0.98) 100%);
        }
        .card-gradient {
            position: relative;
            overflow: hidden;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0)),
                var(--panel);
            border: 1px solid var(--line);
            box-shadow: 0 20px 55px rgba(2, 6, 23, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(18px);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease, background 0.25s ease;
        }
        .card-gradient::before {
            content: "";
            position: absolute;
            inset: 0 0 auto 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(239, 68, 68, 0.65), transparent);
            opacity: 0.62;
        }
        .card-gradient:hover {
            border-color: rgba(239, 68, 68, 0.28);
            box-shadow: 0 26px 68px rgba(2, 6, 23, 0.44), 0 0 0 1px rgba(239, 68, 68, 0.05);
        }
        .form-input, .form-select, .form-textarea {
            background-color: rgba(2, 6, 23, 0.56);
            border: 1px solid rgba(100, 116, 139, 0.34);
            border-radius: 8px;
            color: #f8fafc;
            min-height: 42px;
            padding: 0.65rem 0.8rem;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }
        .form-input::placeholder,
        .form-textarea::placeholder {
            color: #64748b;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #ef4444;
            background-color: rgba(15, 23, 42, 0.92);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2), 0 0 28px rgba(239, 68, 68, 0.08);
        }
        label {
            color: var(--text-soft);
        }
        #main-nav {
            background:
                linear-gradient(180deg, rgba(15, 23, 42, 0.98), rgba(2, 6, 23, 0.98)),
                #111827;
            border-right: 1px solid rgba(148, 163, 184, 0.16);
            box-shadow: 12px 0 34px rgba(2, 6, 23, 0.32);
            backdrop-filter: blur(18px);
        }
        #main-nav button {
            width: 90px;
            min-height: 66px;
            display: grid;
            place-items: center;
            gap: 4px;
            border-radius: 12px;
            border: 1px solid transparent;
            transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        }
        #main-nav button:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.18);
            transform: translateX(2px);
        }
        #main-nav button svg {
            filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0));
            transition: filter 0.2s ease;
        }
        #main-nav button:hover svg,
        #main-nav button.nav-active svg {
            filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.38));
        }
        #main-nav button span {
            display: block;
            max-width: 86px;
            line-height: 1.05;
            overflow-wrap: normal;
            word-break: keep-all;
            hyphens: none;
            text-align: center;
            font-size: 0.6rem;
        }
        #main-content li > button,
        details.bg-gray-700,
        .bg-gray-700 {
            background-color: rgba(51, 65, 85, 0.74) !important;
            border: 1px solid rgba(148, 163, 184, 0.12);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
        }
        #main-content li > button:hover,
        details.bg-gray-700:hover,
        .hover\:bg-gray-600:hover {
            background-color: rgba(71, 85, 105, 0.82) !important;
            border-color: rgba(239, 68, 68, 0.2);
        }
        .admin-photo-placeholder,
        .admin-photo-img {
            box-shadow: 0 0 0 1px rgba(248, 113, 113, 0.22), 0 20px 45px rgba(127, 29, 29, 0.24);
        }
        /* Animação de fade-in */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        /* Estilo para o botão de navegação ativo */
        .nav-active {
            color: #ef4444; /* Vermelho */
            background: rgba(239, 68, 68, 0.12);
            border-color: rgba(239, 68, 68, 0.24) !important;
        }
        /* Estilos para abas */
        .tab-btn {
            border-bottom: 2px solid transparent;
            color: #94a3b8;
            transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }
        .tab-btn:hover {
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.06);
        }
        .tab-btn-active {
            border-bottom-color: #ef4444;
            color: #ef4444;
            text-shadow: 0 0 16px rgba(239, 68, 68, 0.28);
        }
        @media (max-width: 768px) {
            #app {
                margin-left: 0 !important;
                padding-bottom: 6.5rem;
            }
            #app > header {
                position: static;
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            #main-nav {
                top: auto;
                bottom: 0;
                width: 100%;
                height: 82px;
                border-right: 0;
                border-top: 1px solid rgba(148, 163, 184, 0.18);
            }
            #main-nav > div {
                flex-direction: row;
                justify-content: space-around;
                gap: 0.25rem;
                padding: 0 0.35rem;
            }
            #main-nav button {
                width: auto;
                min-width: 52px;
                min-height: 58px;
                padding: 0.35rem;
            }
            #main-nav button:hover {
                transform: translateY(-2px);
            }
            #main-nav button span {
                font-size: 0.62rem;
            }
        }
    </style>
</head>
<body class="antialiased">

    <!-- Tela de Login -->
    <div id="login-screen" class="container mx-auto p-4 md:p-8 flex items-center justify-center min-h-screen">
        <div class="w-full max-w-sm">
            <header class="text-center mb-8">
                <!-- Foto de Perfil no Login -->
                <div class="relative inline-block mb-4" title="Foto do sistema">
                    <img class="admin-photo-img w-40 h-40 md:w-56 md:h-56 rounded-full object-cover border-4 border-red-500 shadow-2xl mx-auto" src="" alt="Perfil" style="display: none;">
                    <div class="admin-photo-placeholder w-40 h-40 md:w-56 md:h-56 rounded-full bg-gradient-to-tr from-red-600 to-red-900 flex items-center justify-center text-5xl md:text-7xl font-bold text-white shadow-2xl border-4 border-red-500/30 mx-auto">
                        TC
                    </div>
                </div>

                <h1 class="text-4xl md:text-5xl font-bold text-red-500 mb-2">Gestão TCAPB</h1>
                <p class="text-lg text-gray-400">Acesso ao Sistema</p>
            </header>
            <div class="card-gradient p-8 rounded-lg shadow-xl">
                <form id="login-form" class="space-y-6">
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-300 mb-1">Usuário</label>
                        <input type="text" id="username" class="form-input w-full rounded-md shadow-sm" required>
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-300 mb-1">Senha</label>
                        <input type="password" id="password" class="form-input w-full rounded-md shadow-sm" required>
                    </div>
                    <button type="submit" class="btn-primary w-full px-4 py-3 rounded-md shadow-lg text-white font-semibold">Entrar</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Conteúdo Principal da Aplicação (inicialmente oculto) -->
    <div id="app" class="ml-28 p-4 md:p-8" style="display: none;">
        <!-- Cabeçalho -->
        <header class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-4 md:gap-6">
                <!-- Foto de Perfil (Painel Interno) -->
                <div class="relative group cursor-pointer" onclick="document.getElementById('admin-photo-upload-app').click()" title="Clique para alterar a foto do sistema">
                    <img class="admin-photo-img w-16 h-16 md:w-20 md:h-20 rounded-full object-cover border-2 border-red-500 shadow-lg" src="" alt="Perfil" style="display: none;">
                    <div class="admin-photo-placeholder w-16 h-16 md:w-20 md:h-20 rounded-full bg-gradient-to-tr from-red-600 to-red-900 flex items-center justify-center text-xl font-bold text-white shadow-lg border-2 border-red-500/30">
                        TC
                    </div>
                    <div class="absolute inset-0 bg-black/60 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                        <span class="text-white text-[10px] md:text-xs font-semibold text-center leading-tight">Mudar</span>
                    </div>
                </div>
                <input type="file" id="admin-photo-upload-app" class="hidden" accept="image/*" onchange="App.uploadAdminPhoto(event)">
                
                <div>
                    <h1 class="text-4xl md:text-5xl font-bold text-red-500 mb-2">Gestão TCAPB</h1>
                    <p class="text-lg text-gray-400">Sistema de Controle Financeiro</p>
                </div>
            </div>
            <button class="btn-secondary px-4 py-2 rounded-md shadow-lg" onclick="App.logout()">Sair</button>
        </header>

        <!-- Conteúdo Principal -->
        <main id="main-content">
            <!-- O conteúdo será renderizado aqui pelo JavaScript -->
        </main>
    </div>

    <!-- Navegação Lateral Fixa -->
    <nav id="main-nav" class="fixed left-0 top-0 h-screen w-28 bg-gray-800 shadow-lg" style="display: none;">
        <div class="flex flex-col h-full justify-center items-center gap-6">
            <button class="text-gray-300 hover:text-red-400 transition-colors duration-300" onclick="App.render('home')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                <span class="text-xs">Início</span>
            </button>
             <button class="text-gray-300 hover:text-red-400 transition-colors duration-300" onclick="App.render('adeptosList')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M15 21a6 6 0 00-9-5.197m0 0A6.995 6.995 0 0012 12.75a6.995 6.995 0 00-3-5.197M15 21a6 6 0 00-9-5.197" /></svg>
                <span class="text-xs">Adeptos</span>
            </button>
            <button class="text-gray-300 hover:text-red-400 transition-colors duration-300" onclick="App.render('inadimplencia')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" /></svg>
                <span class="text-xs">Inadimplentes</span>
            </button>
            <button class="text-gray-300 hover:text-red-400 transition-colors duration-300" onclick="App.render('caixa')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3" /></svg>
                <span class="text-xs">Caixa</span>
            </button>
             <button class="text-gray-300 hover:text-red-400 transition-colors duration-300" onclick="App.render('custos')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                <span class="text-xs">Custos</span>
            </button>
             <button class="text-gray-300 hover:text-red-400 transition-colors duration-300" onclick="App.render('contribuicoes')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v.01M12 6v-1m0-1v-1m0 12v1m0 1v1m0-13a9 9 0 110 18 9 9 0 010-18zm0 0h.01" /></svg>
                <span class="text-xs">Contribuições</span>
            </button>
        </div>
    </nav>

    <script>
        const { jsPDF } = window.jspdf;

        const App = {
            config: {
                username: 'admcontrole',
                password: 'cova666',
                valorMensalidade: 150.00,
                initialDataVersion: '2026-05-15-cadastros-financeiro-v2',
            },
            db: null, // Onde os dados serão mantidos em memória
            state: { // Estado volátil da UI
                currentPage: 'home',
                adeptosFilter: true,
                currentAdeptoIndex: null,
                lastViewedAdeptoIndex: null,
                currentAdeptoTab: 'financeiro',
                currentFinanceiroYear: new Date().getFullYear(),
                editingDebitoIndex: null, // Para edição de débitos
                selectedCaixaAno: new Date().getFullYear(),
                selectedCaixaMes: new Date().getMonth(),
                selectedCustoAno: new Date().getFullYear(),
                selectedCustoMes: new Date().getMonth(),
                editingCustoIndex: null,
                selectedContribAno: new Date().getFullYear(),
                selectedContribMes: new Date().getMonth(),
                editingContribIndex: null,
            },
            dataLimite: new Date(2024, 0, 1), // 1 de Janeiro de 2024

            /**
             * Inicializa a aplicação.
             */
            init: function() {
                document.getElementById('login-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleLogin();
                });

                this.loadAdminPhoto(); // Carrega a foto para aparecer antes mesmo do login

                if (sessionStorage.getItem('isLoggedIn') === 'true') {
                    this.showApp();
                } else {
                    this.showLogin();
                }
            },

            // 0. AUTENTICAÇÃO
            showLogin: function() {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
                document.getElementById('main-nav').style.display = 'none';
            },
            showApp: function() {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('main-nav').style.display = 'block';
                
                this.loadDB();
                const hash = location.hash.slice(1);
                const [page, ...params] = hash.split('/');
                
                if (page === 'adepto' && params[0]) {
                    this.render('adepto', { index: parseInt(params[0], 10), tab: params[1] || 'financeiro' });
                } else if (page === 'adeptoForm' && params[0]) {
                    this.render('adeptoForm', { index: parseInt(params[0], 10) });
                } else {
                    this.render(page || 'home');
                }

                window.addEventListener('hashchange', () => {
                    const hash = location.hash.slice(1);
                    const [page, ...params] = hash.split('/');
                    if (page === 'adepto' && params[0]) {
                        this.render('adepto', { index: parseInt(params[0], 10), tab: params[1] || 'financeiro' });
                    } else if (page === 'adeptoForm' && params[0]) {
                        this.render('adeptoForm', { index: parseInt(params[0], 10) });
                    } else {
                        this.render(page || 'home');
                    }
                });
            },
            handleLogin: function() {
                const user = document.getElementById('username').value;
                const pass = document.getElementById('password').value;
                if (user === this.config.username && pass === this.config.password) {
                    sessionStorage.setItem('isLoggedIn', 'true');
                    this.showApp();
                } else {
                    alert('Usuário ou senha inválidos.');
                }
            },
            logout: function() {
                sessionStorage.removeItem('isLoggedIn');
                location.hash = '';

            uploadAdminPhoto: function(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        // Comprime a imagem para não pesar no navegador
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 300;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_SIZE) {
                                height *= MAX_SIZE / width;
                                width = MAX_SIZE;
                            }
                        } else {
                            if (height > MAX_SIZE) {
                                width *= MAX_SIZE / height;
                                height = MAX_SIZE;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                        localStorage.setItem('tcapb_admin_photo', dataUrl);
                        App.loadAdminPhoto();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            },

                const photoData = localStorage.getItem('tcapb_admin_photo');
                const imgEls = document.querySelectorAll('.admin-photo-img');

                    imgEls.forEach(el => el.style.display = 'none');
                    placeholderEls.forEach(el => el.style.display = 'flex');

            loadDB: function() {
                const dbJson = localStorage.getItem('tqpb_db');
                if (dbJson) {
                    this.db = JSON.parse(dbJson);
                } else {
                    this.db = { adeptos: [], custos: [], contribuicoes: [] };
                }
                if (!this.db.custos) this.db.custos = [];
                if (!this.db.contribuicoes) this.db.contribuicoes = [];

                if (this.db.initialDataVersion !== this.config.initialDataVersion) {
                    const adeptosAtuais = Array.isArray(this.db.adeptos) ? this.db.adeptos : [];
                    const normalizeNome = (nome) => (nome || '').trim().toLocaleLowerCase('pt-BR').replace(/\s+/g, ' ');
                    const adeptosPorNome = new Map(adeptosAtuais.map((adepto) => [normalizeNome(adepto.nome), adepto]));

                    this.db.adeptos = this.getInitialData().map((novoAdepto) => {
                        const adeptoAtual = adeptosPorNome.get(normalizeNome(novoAdepto.nome));

                        if (!adeptoAtual) return novoAdepto;

                        return {
                            ...novoAdepto,
                            id: adeptoAtual.id || novoAdepto.id,
                            foto: adeptoAtual.foto,
                            ativo: adeptoAtual.ativo !== undefined ? adeptoAtual.ativo : novoAdepto.ativo,
                        };
                    });
                    this.db.custos = [];
                    this.db.contribuicoes = [];
                    this.applyInitialFinancialData();
                    this.db.initialDataVersion = this.config.initialDataVersion;
                    this.saveDB();
                }

                if (!this.db.adeptos) this.db.adeptos = [];
            },

            // 2. RENDERIZAÇÃO E NAVEGAÇÃO
            render: function(page, data = {}) {
                const oldPage = this.state.currentPage;
                this.destroyChart(); // Garante que o gráfico seja destruído ao mudar de página
                this.state.currentPage = page;
                const mainContent = document.getElementById('main-content');
                
                let content = '';
                switch (page) {
                    case 'home':
                        location.hash = 'home';
                        content = this.renderHome();
                        break;
                    case 'adeptosList':
                        location.hash = 'adeptosList';
                        content = this.renderAdeptosList();
                        break;
                    case 'adeptoForm':
                        location.hash = 'adeptoForm' + (data.index !== undefined ? `/${data.index}` : '');
                        if (data.index !== undefined) this.state.lastViewedAdeptoIndex = data.index;
                        content = this.renderAdeptoForm(data.index);
                        break;
                    case 'adepto':
                        this.state.currentAdeptoIndex = data.index;
                        this.state.lastViewedAdeptoIndex = data.index;
                        this.state.currentAdeptoTab = data.tab || 'financeiro';
                        location.hash = `adepto/${data.index}/${this.state.currentAdeptoTab}`;
                        content = this.renderAdeptoDetalhes(data.index, data);
                        break;
                    case 'caixa':
                        location.hash = 'caixa';
                        content = this.renderCaixa();
                        break;
                    case 'custos':
                        location.hash = 'custos';
                        this.state.editingCustoIndex = data.editingIndex !== undefined ? data.editingIndex : null;
                        content = this.renderCustos();
                        break;
                    case 'contribuicoes':
                        location.hash = 'contribuicoes';
                        this.state.editingContribIndex = data.editingIndex !== undefined ? data.editingIndex : null;
                        content = this.renderContribuicoes();
                        break;
                    case 'inadimplencia':
                        location.hash = 'inadimplencia';
                        content = this.renderInadimplencia();
                        break;
                    default:
                        this.render('home'); // Redireciona para home se a página for inválida
                        return;
                }
                mainContent.innerHTML = content;
                this.updateNav();

                // Retorna o scroll para o último adepto visualizado
                if (page === 'adeptosList' && this.state.lastViewedAdeptoIndex !== null) {
                    setTimeout(() => {
                        const el = document.getElementById(`adepto-item-${this.state.lastViewedAdeptoIndex}`);
                        if (el) el.scrollIntoView({ behavior: 'auto', block: 'center' });
                        this.state.lastViewedAdeptoIndex = null; // Limpa o estado depois de rolar
                    }, 50);
                } else if (oldPage !== page) {
                    // Rola para o topo sempre que mudar de tela
                    window.scrollTo({ top: 0, behavior: 'auto' });
                }
            },
            updateNav: function() {
                const navButtons = document.querySelectorAll('#main-nav button');
                navButtons.forEach(btn => {
                    const page = btn.getAttribute('onclick').match(/'([^']+)'/)[1];
                    btn.classList.remove('nav-active');
                    if (page === this.state.currentPage || (['adepto', 'adeptoForm'].includes(this.state.currentPage) && page === 'adeptosList')) {
                        btn.classList.add('nav-active');
                    }
                });
            },

            toggleDataBatismo: function(value) {

            },

            saveAdepto: function(index = null) {
                const adeptoData = {
                    ativo: document.getElementById('statusAtivo').value === 'true',
                    nome: document.getElementById('nome').value.trim(),
                    dataNascimento: document.getElementById('dataNascimento').value,
                    dataEntradaTQPB: document.getElementById('dataEntradaTQPB').value,
                    estadoCivil: document.getElementById('estadoCivil').value,
                    endereco: document.getElementById('endereco').value,
                    complemento: document.getElementById('complemento').value,
                    email: document.getElementById('email').value,
                    redeSocialTipo: document.getElementById('redeSocialTipo').value,
                    redeSocialUser: document.getElementById('redeSocialUser').value,
                    telefone: document.getElementById('telefone').value,
                    atividadeProfissional: document.getElementById('atividadeProfissional').value,
                    mestreExu: document.getElementById('mestreExu').value,
                    mestraPombagira: document.getElementById('mestraPombagira').value,
                    comoSoube: document.getElementById('comoSoube').value,
                    obrigacoesRealizadas: document.getElementById('obrigacoesRealizadas').value,
                    statusBatismo: document.getElementById('statusBatismo').value,
                    dataBatismo: document.getElementById('dataBatismo').value,
                    alergiaDoenca: document.getElementById('alergiaDoenca').value,
                    medicacaoDrogas: document.getElementById('medicacaoDrogas').value,
                };

                if (adeptoData.statusBatismo !== 'Batizado(a)') {
                    adeptoData.dataBatismo = ''; // Limpa a data se não for batizado
                }

                if (!adeptoData.nome || !adeptoData.dataEntradaTQPB) {
                    alert('Os campos "Nome" e "Data de Entrada no TCAPB" são obrigatórios.');
                    return;
                }

                if (index !== null) {
                    const oldData = this.db.adeptos[index];
                    this.db.adeptos[index] = { ...oldData, ...adeptoData };
                } else {
                    adeptoData.id = Date.now();
                    adeptoData.financeiro = { mensalidades: {}, debitos: [] };
                    this.db.adeptos.push(adeptoData);
                    index = this.db.adeptos.length - 1;
                }

                this.saveDB();
                this.render('adepto', { index: index, tab: 'cadastro' });
            },

            deleteAdepto: function(index) {
                if (confirm(`Tem certeza que deseja apagar o adepto "${this.db.adeptos[index].nome}"? Esta ação não pode ser desfeita.`)) {
                    this.db.adeptos.splice(index, 1);
                    this.saveDB();
                    this.render('adeptosList');
                }
            },

            // 4. SEÇÃO: FINANCEIRO
            renderFinanceiroAdepto: function(index) {
                this.checkAndUpdateMensalidades(index);

                let content = `<div class="space-y-8">`;

                // --- SEÇÃO DE MENSALIDADES ---
                content += `
                    <div class="card-gradient p-6 rounded-lg shadow-xl">
                        <h3 class="text-xl font-semibold mb-4 text-gray-200">Mensalidades</h3>
                        <div class="flex justify-center items-center gap-4 mb-6">
                            <button class="btn-secondary p-2 rounded-full" onclick="App.changeFinanceiroYear(${index}, -1)"> &lt; </button>
                            <span class="text-2xl font-semibold text-gray-200">${this.state.currentFinanceiroYear}</span>
                            <button class="btn-secondary p-2 rounded-full" onclick="App.changeFinanceiroYear(${index}, 1)"> &gt; </button>
                        </div>
                        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                            ${this.renderBotoesMensalidade(index)}
                        </div>
                    </div>
                `;

                // --- SEÇÃO DE DÉBITOS/COMPRAS ---
                content += this.renderDebitosSection(index);

                // --- RESUMO FINANCEIRO ---
                const resumo = this.calcularResumoFinanceiro(index);
                const saldoClass = resumo.saldo < 0 ? 'text-red-400' : 'text-green-400';
                content += `
                    <div class="card-gradient p-6 rounded-lg shadow-xl mt-8 sticky bottom-4">
                        <h3 class="text-xl font-semibold mb-2 text-gray-200">Resumo Financeiro</h3>
                        <div class="flex justify-between items-center text-lg">
                            <span class="font-semibold">Saldo:</span>
                            <span class="font-bold ${saldoClass}">${this.formatCurrency(resumo.saldo)}</span>
                        </div>
                    </div>
                `;

                content += `</div>`;
                return content;
            },

            renderBotoesMensalidade: function(adeptoIndex) {
                const adepto = this.db.adeptos[adeptoIndex];
                const ano = this.state.currentFinanceiroYear;
                const mensalidadesDoAno = adepto.financeiro.mensalidades[ano] || {};
                const nomesMeses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
                
                let buttonsHTML = '';
                for (let mesIndex = 0; mesIndex < 12; mesIndex++) {
                    const mensalidade = mensalidadesDoAno[mesIndex] || {};
                    const status = mensalidade.status || 'desativado';
                    let statusClass = '';
                    let isDisabled = false;

                     switch (status) {
                        case 'pendente': statusClass = 'bg-red-700 hover:bg-red-600'; break;
                        case 'pago': statusClass = 'bg-green-600 hover:bg-green-500'; break;
                        case 'adiantado': statusClass = 'bg-yellow-500 hover:bg-yellow-400'; break;
                        case 'parcial': statusClass = 'bg-blue-600 hover:bg-blue-500'; break;
                        case 'isento': statusClass = 'bg-gray-500 hover:bg-gray-400'; break;
                        case 'futuro': statusClass = 'bg-gray-600 hover:bg-gray-500'; break;
                        default:
                            statusClass = 'bg-gray-800 opacity-50 cursor-not-allowed';
                            isDisabled = true;
                    }
                    
                    buttonsHTML += `
                        <button class="p-3 rounded-md text-white font-semibold transition-colors duration-200 ${statusClass}" 
                                ${isDisabled ? 'disabled' : `onclick="App.togglePagamentoMensalidade(${adeptoIndex}, ${ano}, ${mesIndex})"`}>
                            ${nomesMeses[mesIndex]}
                            ${status === 'parcial' ? `<br><span class="text-xs font-normal">${this.formatCurrency(mensalidade.valorPago)}</span>` : ''}
                        </button>
                    `;
                }
                return buttonsHTML;
            },

            checkAndUpdateMensalidades: function(adeptoIndex) {
                const adepto = this.db.adeptos[adeptoIndex];
                const dataEntrada = this.parseDate(adepto.dataEntradaTQPB);
                if (!dataEntrada) return;

                const hoje = new Date();
                const anoAtual = hoje.getFullYear();
                const mesAtual = hoje.getMonth();
                const anoAlvo = this.state.currentFinanceiroYear;

                // Garante que o ano atual e o ano alvo (e todos entre eles) existam
                const anoMaximo = Math.max(anoAtual + 5, anoAlvo + 5); // Garante 5 anos no futuro
                for (let ano = 2024; ano <= anoMaximo; ano++) {
                    if (!adepto.financeiro.mensalidades[ano]) {
                        adepto.financeiro.mensalidades[ano] = {};
                    }

                    for (let mes = 0; mes < 12; mes++) {
                        const dataReferencia = new Date(ano, mes, 1);
                        
                        const mesEntrada = new Date(dataEntrada.getFullYear(), dataEntrada.getMonth(), 1);
                        if (dataReferencia < mesEntrada) {
                            if (!adepto.financeiro.mensalidades[ano][mes]) {
                                adepto.financeiro.mensalidades[ano][mes] = { status: 'desativado' };
                            }
                            continue;
                        }
                        if (!adepto.financeiro.mensalidades[ano][mes]) {
                            if (ano < anoAtual || (ano === anoAtual && mes <= mesAtual)) {
                                adepto.financeiro.mensalidades[ano][mes] = { status: 'pendente', valorPago: 0 };
                            } else {
                                adepto.financeiro.mensalidades[ano][mes] = { status: 'futuro' };
                            }
                        }
                    }
                }
                this.saveDB();
            },

            togglePagamentoMensalidade: function(adeptoIndex, ano, mes) {
                const mensalidade = this.db.adeptos[adeptoIndex].financeiro.mensalidades[ano][mes];

                switch (mensalidade.status) {
                    case 'pendente':
                    case 'futuro':
                        mensalidade.status = 'pago';
                        mensalidade.valorPago = this.config.valorMensalidade;
                        break;
                    case 'pago':
                        mensalidade.status = 'adiantado';
                        mensalidade.valorPago = this.config.valorMensalidade;
                        break;
                    case 'adiantado':
                        mensalidade.status = 'parcial';
                        const valorParcial = parseFloat(prompt("Informe o valor parcial pago:", ""));
                        if (valorParcial === null || isNaN(valorParcial)) {
                            mensalidade.status = 'adiantado';
                        } else if (!isNaN(valorParcial) && valorParcial > 0) {
                            mensalidade.valorPago = valorParcial;
                        } else {
                            alert("Valor inválido. O status será revertido para 'Adiantado'.");
                            mensalidade.status = 'adiantado';
                        }
                        break;
                    case 'parcial':
                        mensalidade.status = 'isento';
                        mensalidade.valorPago = 0;
                        break;
                    case 'isento':
                        mensalidade.status = 'pendente';
                        mensalidade.valorPago = 0;
                        break;
                }

                this.saveDB();
                this.render('adepto', { index: adeptoIndex, tab: 'financeiro' });
            },
            
            changeFinanceiroYear: function(adeptoIndex, direction) {
                this.state.currentFinanceiroYear += direction;
                this.render('adepto', { index: adeptoIndex, tab: 'financeiro' });
            },

            // --- SEÇÃO DE DÉBITOS ---
            renderDebitosSection: function(adeptoIndex) {
                const isEditing = this.state.editingDebitoIndex !== null;
                const debito = isEditing ? this.db.adeptos[adeptoIndex].financeiro.debitos[this.state.editingDebitoIndex] : {};

                let content = `
                    <div class="card-gradient p-6 rounded-lg shadow-xl">
                        <h3 class="text-xl font-semibold mb-4 text-gray-200">${isEditing ? 'Editar Débito' : 'Débitos e Compras'}</h3>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                            <input type="date" id="debito-data" class="form-input md:col-span-1" style="color-scheme: dark;" value="${debito.data || ''}">
                            <input type="text" id="debito-obs" placeholder="Observação" class="form-input md:col-span-2" value="${debito.obs || ''}">
                            <input type="number" id="debito-valor" placeholder="Valor (R$)" class="form-input" value="${debito.valor || ''}">
                            <button class="btn-primary md:col-span-4" onclick="App.saveDebito(${adeptoIndex})">${isEditing ? 'Atualizar Débito' : 'Adicionar Débito'}</button>
                            ${isEditing ? `<button class="btn-secondary md:col-span-4 mt-2" onclick="App.cancelEditDebito(${adeptoIndex})">Cancelar Edição</button>` : ''}
                        </div>
                        <div id="debitos-list" class="space-y-3">
                            ${this.renderListaDebitos(adeptoIndex)}
                        </div>
                    </div>
                `;
                return content;
            },

            renderListaDebitos: function(adeptoIndex) {
                const adepto = this.db.adeptos[adeptoIndex];
                if (!adepto.financeiro?.debitos || adepto.financeiro.debitos.length === 0) {
                    return '<p class="text-gray-400">Nenhum débito registrado.</p>';
                }

                return adepto.financeiro.debitos.map((debito, debitoIndex) => {
                    let statusClass, statusText;
                    switch(debito.status) {
                        case 'pago':
                            statusClass = 'bg-green-600'; statusText = 'Pago'; break;
                        case 'parcial':
                            statusClass = 'bg-blue-600'; statusText = `Parcial (${this.formatCurrency(debito.valorPago)})`; break;
                        default:
                            statusClass = 'bg-red-700'; statusText = 'Pendente';
                    }

                    return `
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center p-3 bg-gray-500 rounded-md gap-2">
                            <div class="flex-1">
                                <p class="font-semibold text-gray-100">${this.formatDate(debito.data)} - ${debito.obs}</p>
                                <p class="text-sm text-gray-200">${this.formatCurrency(debito.valor)}</p>
                            </div>
                            <div class="flex items-center gap-2 w-full md:w-auto mt-2 md:mt-0">
                                <button class="flex-grow text-center px-3 py-1 rounded-md text-white text-xs font-medium ${statusClass}" onclick="App.toggleDebitoStatus(${adeptoIndex}, ${debitoIndex})">
                                    ${statusText}
                                </button>
                                <button class="px-3 py-1 rounded-md text-white text-xs font-medium bg-blue-600" onclick="App.setDebitoParcial(${adeptoIndex}, ${debitoIndex})">
                                    Parcial
                                </button>
                                <button class="text-blue-300 hover:text-blue-200 p-1" onclick="App.editDebito(${adeptoIndex}, ${debitoIndex})" title="Editar Débito">✏️</button>
                                <button class="text-red-400 hover:text-red-300 p-1" onclick="App.deleteDebito(${adeptoIndex}, ${debitoIndex})" title="Apagar Débito">🗑️</button>
                            </div>
                        </div>
                    `;
                }).join('');
            },

            saveDebito: function(adeptoIndex) {
                const data = document.getElementById('debito-data').value;
                const obs = document.getElementById('debito-obs').value;
                const valor = parseFloat(document.getElementById('debito-valor').value);

                if (!data || !obs || isNaN(valor) || valor <= 0) {
                    alert('Por favor, preencha todos os campos do débito corretamente.');
                    return;
                }

                if (this.state.editingDebitoIndex !== null) {
                    const debito = this.db.adeptos[adeptoIndex].financeiro.debitos[this.state.editingDebitoIndex];
                    debito.data = data;
                    debito.obs = obs;
                    debito.valor = valor;
                } else {
                    this.db.adeptos[adeptoIndex].financeiro.debitos.unshift({ data, obs, valor, status: 'pendente', valorPago: 0 });
                }
                
                this.state.editingDebitoIndex = null;
                this.saveDB();
                this.render('adepto', { index: adeptoIndex, tab: 'financeiro' });
            },

            editDebito: function(adeptoIndex, debitoIndex) {
                this.render('adepto', { index: adeptoIndex, tab: 'financeiro', editingDebitoIndex: debitoIndex });
            },

            cancelEditDebito: function(adeptoIndex) {
                this.render('adepto', { index: adeptoIndex, tab: 'financeiro', editingDebitoIndex: null });
            },

            toggleDebitoStatus: function(adeptoIndex, debitoIndex) {
                const debito = this.db.adeptos[adeptoIndex].financeiro.debitos[debitoIndex];
                if (debito.status === 'pago') {
                    debito.status = 'pendente';
                    debito.valorPago = 0;
                } else {
                    debito.status = 'pago';
                    debito.valorPago = debito.valor;
                }
                this.saveDB();
                this.render('adepto', { index: adeptoIndex, tab: 'financeiro' });
            },

            setDebitoParcial: function(adeptoIndex, debitoIndex) {
                const debito = this.db.adeptos[adeptoIndex].financeiro.debitos[debitoIndex];
                const valorParcial = parseFloat(prompt("Informe o valor parcial pago:", debito.valorPago || ""));
                
                if (valorParcial === null) return;

                if (!isNaN(valorParcial) && valorParcial >= 0 && valorParcial < debito.valor) {
                    debito.status = 'parcial';
                    debito.valorPago = valorParcial;
                } else if (valorParcial >= debito.valor) {
                    debito.status = 'pago';
                    debito.valorPago = debito.valor;
                } else {
                    alert("Valor inválido.");
                }
                this.saveDB();
                this.render('adepto', { index: adeptoIndex, tab: 'financeiro' });
            },

            deleteDebito: function(adeptoIndex, debitoIndex) {
                if (confirm('Tem certeza que deseja apagar este débito?')) {
                    this.db.adeptos[adeptoIndex].financeiro.debitos.splice(debitoIndex, 1);
                    this.saveDB();
                    this.render('adepto', { index: adeptoIndex, tab: 'financeiro' });
                }
            },

            calcularResumoFinanceiro: function(adeptoIndex) {
                const adepto = this.db.adeptos[adeptoIndex];
                let saldo = 0;

                for (const ano in adepto.financeiro.mensalidades) {
                    for (const mes in adepto.financeiro.mensalidades[ano] || {}) {
                        const mensalidade = adepto.financeiro.mensalidades[ano][mes];
                        if (mensalidade.status === 'pendente') {
                            saldo -= this.config.valorMensalidade;
                        } else if (mensalidade.status === 'parcial') {
                            saldo -= (this.config.valorMensalidade - mensalidade.valorPago);
                        }
                    }
                }

                (adepto.financeiro.debitos || []).forEach(debito => {
                    if (debito.status === 'pendente') {
                        saldo -= debito.valor;
                    } else if (debito.status === 'parcial') {
                        saldo -= (debito.valor - debito.valorPago);
                    }
                });

                return { saldo };
            },

            // Variável para armazenar a instância do gráfico
            chartInstance: null,

            destroyChart: function() {
                if (this.chartInstance) {
                    this.chartInstance.destroy();
                    this.chartInstance = null;
                }
            },
            // 5. SEÇÃO: CAIXA, CUSTOS E CONTRIBUIÇÕES
            renderCaixa: function() {
                const anosDisponiveis = this.getAnosDisponiveis();
                const nomesMeses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
                let content = `<h2 class="text-3xl font-semibold mb-6 text-red-400">Balanço de Caixa</h2>`;

                content += `<div class="flex flex-wrap gap-4">`;
                content += `<div class="flex-1 min-w-[120px]">

                                <select id="caixa-ano-select" class="form-select w-full" onchange="App.selectCaixaAno(this.value)">

                                <label for="caixa-mes-select" class="block text-sm font-medium text-gray-300 mb-1">Mês</label>

                                    ${nomesMeses.map((nome, index) => `<option value="${index}" ${index === this.state.selectedCaixaMes ? 'selected' : ''}>${nome}</option>`).join('')}
                                </select>
                            </div>`;
                content += `</div></div>`;

                // --- Cálculos Mensais ---
                const anoSel = this.state.selectedCaixaAno;
                const mesSel = this.state.selectedCaixaMes;

                let mensalidadesMes = 0;
                let debitosPagosMes = 0;
                this.db.adeptos.forEach(adepto => {
                    // Soma mensalidades pagas no mês
                    const mensalidade = adepto.financeiro?.mensalidades?.[anoSel]?.[mesSel];
                    if (mensalidade) {
                        if (mensalidade.status === 'pago' || mensalidade.status === 'adiantado') {
                            mensalidadesMes += this.config.valorMensalidade;
                        } else if (mensalidade.status === 'parcial') {
                            mensalidadesMes += mensalidade.valorPago;
                        }
                    }
                    // Soma débitos pagos no mês
                    (adepto.financeiro.debitos || []).forEach(debito => {
                        const dataDebito = this.parseDate(debito.data);
                        if (debito.status === 'pago' && dataDebito && dataDebito.getFullYear() === anoSel && dataDebito.getMonth() === mesSel) {
                            debitosPagosMes += debito.valor;
                        }
                    });
                });
                const contribuicoesMes = this.db.contribuicoes.reduce((acc, c) => {
                    const data = this.parseDate(c.data);
                    return data && data.getFullYear() === anoSel && data.getMonth() === mesSel ? acc + c.valor : acc;
                }, 0);
                const custosMes = this.db.custos.reduce((acc, c) => {
                    const data = this.parseDate(c.data);
                    return data && c.pago && data.getFullYear() === anoSel && data.getMonth() === mesSel ? acc + c.valor : acc;
                }, 0);
                const entradasMes = mensalidadesMes + contribuicoesMes + debitosPagosMes;
                const balancoMes = entradasMes - custosMes;

                // --- Cálculos Anuais ---
                let mensalidadesAno = 0;
                let debitosPagosAno = 0;
                this.db.adeptos.forEach(adepto => {
                    // Soma débitos pagos no ano
                     (adepto.financeiro.debitos || []).forEach(debito => {
                        const dataDebito = this.parseDate(debito.data);
                        if (debito.status === 'pago' && dataDebito && dataDebito.getFullYear() === anoSel) {
                            debitosPagosAno += debito.valor;
                        }
                    });
                    // Soma mensalidades pagas no ano
                    const mensalidadesDoAno = adepto.financeiro?.mensalidades?.[anoSel] ?? {};
                    for (const mes in mensalidadesDoAno) {
                        const mensalidade = mensalidadesDoAno[mes];
                        if (mensalidade.status === 'pago' || mensalidade.status === 'adiantado') {
                            mensalidadesAno += this.config.valorMensalidade;
                        } else if (mensalidade.status === 'parcial') {
                            mensalidadesAno += mensalidade.valorPago;
                        }
                    }
                });
                const contribuicoesAno = this.db.contribuicoes.reduce((acc, c) => this.parseDate(c.data)?.getFullYear() === anoSel ? acc + c.valor : acc, 0);
                const custosAno = this.db.custos.reduce((acc, c) => this.parseDate(c.data)?.getFullYear() === anoSel && c.pago ? acc + c.valor : acc, 0);
                const entradasAno = mensalidadesAno + contribuicoesAno + debitosPagosAno;
                const balancoAno = entradasAno - custosAno;

                // --- Renderização ---
                content += `<div class="grid grid-cols-1 lg:grid-cols-2 gap-6 fade-in">`;

                // Coluna Balanço Mensal
                content += `<div class="space-y-6">
                                <div class="card-gradient p-6 rounded-lg shadow-xl">
                                    <h3 class="text-xl font-semibold mb-4 text-gray-200">Balanço de ${nomesMeses[mesSel]} de ${anoSel}</h3>
                                    <div class="space-y-2">
                                        <div class="flex justify-between items-center"><span class="text-gray-300">Entradas (Débitos Pagos):</span><span class="font-bold text-green-400">${this.formatCurrency(debitosPagosMes)}</span></div>
                                        <div class="flex justify-between items-center"><span class="text-gray-300">Entradas (Mensalidades):</span><span class="font-bold text-green-400">${this.formatCurrency(mensalidadesMes)}</span></div>
                                        <div class="flex justify-between items-center"><span class="text-gray-300">Entradas (Contribuições):</span><span class="font-bold text-green-400">${this.formatCurrency(contribuicoesMes)}</span></div>
                                        <div class="flex justify-between items-center border-t border-gray-600 pt-2 mt-2"><span class="font-semibold text-gray-200">Total de Entradas:</span><span class="font-bold text-green-300">${this.formatCurrency(entradasMes)}</span></div>
                                        <div class="flex justify-between items-center"><span class="text-gray-300">Total de Saídas (Custos):</span><span class="font-bold text-red-400">${this.formatCurrency(custosMes)}</span></div>
                                        <div class="flex justify-between items-center text-lg border-t-2 border-gray-500 pt-3 mt-3"><span class="font-semibold text-gray-100">Saldo do Mês:</span><span class="font-bold ${balancoMes >= 0 ? 'text-green-400' : 'text-red-400'}">${this.formatCurrency(balancoMes)}</span></div>
                                    </div>
                                </div>
                                <div class="card-gradient p-6 rounded-lg shadow-xl">
                                    <h3 class="text-xl font-semibold mb-4 text-gray-200">Proporção do Mês</h3>
                                    <canvas id="caixa-chart"></canvas>
                                </div>
                            </div>`;

                // Coluna Balanço Anual
                content += `<div class="space-y-6">
                                <div class="card-gradient p-6 rounded-lg shadow-xl">
                                    <h3 class="text-xl font-semibold mb-4 text-gray-200">Resumo do Ano de ${anoSel}</h3>
                                    <div class="space-y-2">
                                        <div class="flex justify-between items-center"><span class="text-gray-300">Entradas (Débitos Pagos):</span><span class="font-bold text-green-400">${this.formatCurrency(debitosPagosAno)}</span></div>
                                        <div class="flex justify-between items-center"><span class="text-gray-300">Entradas (Mensalidades):</span><span class="font-bold text-green-400">${this.formatCurrency(mensalidadesAno)}</span></div>
                                        <div class="flex justify-between items-center"><span class="text-gray-300">Entradas (Contribuições):</span><span class="font-bold text-green-400">${this.formatCurrency(contribuicoesAno)}</span></div>
                                        <div class="flex justify-between items-center border-t border-gray-600 pt-2 mt-2"><span class="font-semibold text-gray-200">Total de Entradas:</span><span class="font-bold text-green-300">${this.formatCurrency(entradasAno)}</span></div>
                                        <div class="flex justify-between items-center"><span class="text-gray-300">Total de Saídas (Custos):</span><span class="font-bold text-red-400">${this.formatCurrency(custosAno)}</span></div>
                                        <div class="flex justify-between items-center text-lg border-t-2 border-gray-500 pt-3 mt-3"><span class="font-semibold text-gray-100">Saldo do Ano:</span><span class="font-bold ${balancoAno >= 0 ? 'text-green-400' : 'text-red-400'}">${this.formatCurrency(balancoAno)}</span></div>
                                    </div>
                                </div>
                            </div>`;

                content += `</div>`;

                // Adiciona um pequeno delay para garantir que o canvas exista no DOM antes de criar o gráfico
                setTimeout(() => {
                    this.destroyChart(); // Destrói gráfico anterior se existir
                    const ctx = document.getElementById('caixa-chart');
                    if (ctx) {
                        this.chartInstance = new Chart(ctx, {
                            type: 'pie',
                            data: {
                                labels: ['Entradas', 'Saídas'],
                                datasets: [{
                                    label: 'Balanço do Mês',
                                    data: [entradasMes, custosMes],
                                    backgroundColor: [
                                        'rgba(74, 222, 128, 0.7)', // green-400 com opacidade
                                        'rgba(248, 113, 113, 0.7)'  // red-400 com opacidade

                                    borderColor: [
                                        'rgba(187, 247, 208, 1)', // green-200
                                        'rgba(252, 165, 165, 1)'   // red-300

                                    borderWidth: 1

                            options: { plugins: { legend: { labels: { color: '#d1d5db' } } } }

                return content;

            selectCaixaAno: function(ano) {
                this.state.selectedCaixaAno = parseInt(ano, 10);
                this.render('caixa');

                            </div>`;
                content += `</div>`;
